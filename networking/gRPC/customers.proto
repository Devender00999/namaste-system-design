syntax = "proto3";

service CustomerService {
  rpc GetAll(Empty) return (CustomerList) {}
  rpc Get(CustomRequestId) return (Customer) {}
  rpc Insert(Customer) return (Customer) {}
  rpc Update(Customer) return (Customer) {}
  rpc Remove(CustomRequestId) return (Empty) {}
  rpc Delete(CustomRequestId) return (Empty) {}
}
message Empty {}

message CustomerList {
  repeated Customer customers = 1;
}

message CustomerRequestId {
  string id = 1
}

message Customer {
  string id = 1;
  string name = 2;
  int32 age = 3;
  string address = 4;
}